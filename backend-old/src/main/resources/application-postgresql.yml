spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://dev.beiktech.com:9523/swc_wx_dev?currentSchema=bonto_link_manager
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 16
