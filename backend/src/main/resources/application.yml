server:
  port: 8088
  servlet:
    context-path: /bontolink

spring:
  application:
    name: bontolink-backend
  profiles:
    active: postgresql
  flyway:
    enabled: true
    # common = 两方言共用的种子数据; {vendor} 自动解析为 sqlite / postgresql
    locations: classpath:db/migration/common,classpath:db/migration/{vendor}
    # 已有旧库(无 flyway 历史表)时,以当前为基线开始记录,不重复执行 baseline
    baseline-on-migrate: true
    baseline-version: 0
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  # Redis 连接配置（仅当 bontolink.cache.type=remote 时生效）
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

# 缓存配置开关
bontolink:
  cache:
    # 缓存类型: local(仅本地Caffeine) / remote(本地+Redis二级缓存) / none(禁用)
    type: local
  datasource:
    pool:
      max-pool-size: 5
      min-idle: 2
      connection-timeout-ms: 30000
      idle-timeout-ms: 300000
      max-lifetime-ms: 1800000
      leak-detection-threshold-ms: 0

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.beiktech.bontolink.entity
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30
    cache-enabled: true

jetcache:
  statIntervalMinutes: 0
  areaInCacheName: false
  local:
    default:
      type: caffeine
      limit: 500
      keyConvertor: fastjson2
      expireAfterWriteInMillis: 1800000
  # 启用 Redis 二级缓存：将 bontolink.cache.type 改为 remote，并取消下方注释
  # remote:
  #   default:
  #     type: redis.springdata
  #     keyConvertor: fastjson2
  #     valueEncoder: java
  #     valueDecoder: java
  #     expireAfterWriteInMillis: 1800000
  #     poolConfig:
  #       minIdle: 5
  #       maxIdle: 20
  #       maxTotal: 50

logging:
  level:
    root: INFO
    com.beiktech.bontolink: DEBUG
    org.springframework.jdbc.core: INFO
    org.flywaydb: INFO
